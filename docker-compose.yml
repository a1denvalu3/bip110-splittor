version: '3.8'

services:
  bitcoind-main:
    image: lncm/bitcoind:v26.0
    container_name: bitcoind-main
    ports:
      - "18443:18443"
      - "18445:18444" # P2P port
    command:
      - -regtest=1
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcuser=user
      - -rpcpassword=password
      - -server=1
      - -txindex=1
      - -fallbackfee=0.0001

  bitcoind-bip110:
    image: bitcoinknots/bitcoin:latest
    container_name: bitcoind-bip110
    ports:
      - "18444:18443" # RPC port
      - "18446:18444" # P2P port
    command:
      - -regtest=1
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcuser=user
      - -rpcpassword=password
      - -server=1
      - -txindex=1
      - -fallbackfee=0.0001
